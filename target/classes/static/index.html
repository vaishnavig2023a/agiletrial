<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Auction System</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
            padding: 28px;
            margin-top: 20px;
        }

        h1 {
            text-align: center;
            margin-top: 0;
            color: #0f172a;
        }

        .subtitle {
            text-align: center;
            color: #64748b;
            margin-bottom: 24px;
        }

        .section {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .section h2 {
            margin-top: 0;
            color: #1d4ed8;
            margin-bottom: 16px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        .full {
            grid-column: 1 / -1;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
            color: #1e293b;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 15px;
        }

        input:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
        }

        .btn-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        button {
            padding: 12px 18px;
            border: none;
            border-radius: 8px;
            background: #2563eb;
            color: white;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s ease;
        }

        button:hover {
            background: #1d4ed8;
        }

        button.secondary {
            background: #475569;
        }

        button.secondary:hover {
            background: #334155;
        }

        button.danger {
            background: #dc2626;
        }

        button.danger:hover {
            background: #b91c1c;
        }

        .message {
            margin-top: 14px;
            padding: 12px;
            border-radius: 8px;
            display: none;
            font-weight: bold;
        }

        .success {
            display: block;
            background: #dcfce7;
            color: #166534;
            border: 1px solid #86efac;
        }

        .error {
            display: block;
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fca5a5;
        }

        .info {
            display: block;
            background: #dbeafe;
            color: #1e3a8a;
            border: 1px solid #93c5fd;
        }

        .highest-box {
            font-size: 16px;
            line-height: 1.7;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 12px;
            background: white;
            border-radius: 8px;
            overflow: hidden;
        }

        th, td {
            padding: 12px;
            border: 1px solid #e2e8f0;
            text-align: left;
        }

        th {
            background: #e2e8f0;
            color: #0f172a;
        }

        .empty {
            padding: 12px;
            background: white;
            border: 1px dashed #cbd5e1;
            border-radius: 8px;
            color: #64748b;
            margin-top: 12px;
        }

        @media (max-width: 700px) {
            .grid {
                grid-template-columns: 1fr;
            }

            .btn-row {
                flex-direction: column;
            }

            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Online Auction System</h1>
    <div class="subtitle">Frontend only auction app using browser storage</div>

    <div class="section">
        <h2>Place a Bid</h2>

        <div class="grid">
            <div>
                <label for="itemId">Item ID</label>
                <input type="number" id="itemId" placeholder="Enter item ID" value="1">
            </div>

            <div>
                <label for="startingPrice">Starting Price</label>
                <input type="number" id="startingPrice" placeholder="Enter starting price" value="500" step="0.01">
            </div>

            <div>
                <label for="bidderName">Bidder Name</label>
                <input type="text" id="bidderName" placeholder="Enter bidder name">
            </div>

            <div>
                <label for="bidAmount">Bid Amount</label>
                <input type="number" id="bidAmount" placeholder="Enter bid amount" step="0.01">
            </div>
        </div>

        <div class="btn-row">
            <button id="submitBidBtn" type="button">Submit Bid</button>
            <button id="highestBidBtn" type="button" class="secondary">Get Highest Bid</button>
            <button id="viewBidsBtn" type="button" class="secondary">View All Bids</button>
            <button id="clearDataBtn" type="button" class="danger">Clear All Data</button>
        </div>

        <div id="messageBox" class="message"></div>
    </div>

    <div class="section">
        <h2>Highest Bid</h2>
        <div id="highestBidBox" class="message info highest-box" style="display:none;"></div>
    </div>

    <div class="section">
        <h2>Bid History</h2>
        <div id="bidsContainer"></div>
    </div>
</div>

<script>
    const STORAGE_KEY = "auctionData";

    document.addEventListener("DOMContentLoaded", function () {
        document.getElementById("submitBidBtn").addEventListener("click", submitBid);
        document.getElementById("highestBidBtn").addEventListener("click", showHighestBid);
        document.getElementById("viewBidsBtn").addEventListener("click", showAllBids);
        document.getElementById("clearDataBtn").addEventListener("click", clearAllData);

        showAllBids();
    });

    function getAuctionData() {
        const raw = localStorage.getItem(STORAGE_KEY);
        return raw ? JSON.parse(raw) : {};
    }

    function saveAuctionData(data) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    function showMessage(text, type) {
        const box = document.getElementById("messageBox");
        box.className = "message " + type;
        box.textContent = text;
        box.style.display = "block";
    }

    function hideMessage() {
        const box = document.getElementById("messageBox");
        box.style.display = "none";
        box.textContent = "";
        box.className = "message";
    }

    function showHighestBox(text, type) {
        const box = document.getElementById("highestBidBox");
        box.className = "message " + type + " highest-box";
        box.textContent = text;
        box.style.display = "block";
    }

    function getInputs() {
        return {
            itemId: document.getElementById("itemId").value.trim(),
            startingPrice: document.getElementById("startingPrice").value.trim(),
            bidderName: document.getElementById("bidderName").value.trim(),
            bidAmount: document.getElementById("bidAmount").value.trim()
        };
    }

    function submitBid() {
        hideMessage();

        const { itemId, startingPrice, bidderName, bidAmount } = getInputs();

        if (itemId === "") {
            showMessage("Please enter Item ID.", "error");
            return;
        }

        if (startingPrice === "") {
            showMessage("Please enter Starting Price.", "error");
            return;
        }

        if (bidderName === "") {
            showMessage("Bidder name cannot be empty.", "error");
            return;
        }

        if (bidAmount === "") {
            showMessage("Please enter Bid Amount.", "error");
            return;
        }

        const parsedItemId = Number(itemId);
        const parsedStartingPrice = Number(startingPrice);
        const parsedBidAmount = Number(bidAmount);

        if (isNaN(parsedItemId) || parsedItemId <= 0) {
            showMessage("Invalid item ID.", "error");
            return;
        }

        if (isNaN(parsedStartingPrice) || parsedStartingPrice < 0) {
            showMessage("Starting price must be zero or greater.", "error");
            return;
        }

        if (isNaN(parsedBidAmount) || parsedBidAmount <= 0) {
            showMessage("Bid amount must be greater than zero.", "error");
            return;
        }

        const data = getAuctionData();

        if (!data[parsedItemId]) {
            data[parsedItemId] = {
                startingPrice: parsedStartingPrice,
                bids: []
            };
        }

        const item = data[parsedItemId];

        if (item.bids.length === 0) {
            item.startingPrice = parsedStartingPrice;
        }

        let currentHighest = item.startingPrice;

        if (item.bids.length > 0) {
            currentHighest = Math.max(...item.bids.map(bid => bid.amount));
        }

        if (parsedBidAmount <= currentHighest) {
            showMessage("Bid must be greater than current highest bid or starting price.", "error");
            return;
        }

        item.bids.push({
            bidder: bidderName,
            amount: parsedBidAmount,
            time: new Date().toLocaleString()
        });

        saveAuctionData(data);

        showMessage("Bid placed successfully by " + bidderName + " for amount " + parsedBidAmount, "success");

        document.getElementById("bidderName").value = "";
        document.getElementById("bidAmount").value = "";

        showHighestBid();
        showAllBids();
    }

    function showHighestBid() {
        const itemId = document.getElementById("itemId").value.trim();

        if (itemId === "") {
            showHighestBox("Please enter Item ID.", "error");
            return;
        }

        const parsedItemId = Number(itemId);

        if (isNaN(parsedItemId) || parsedItemId <= 0) {
            showHighestBox("Invalid item ID.", "error");
            return;
        }

        const data = getAuctionData();
        const item = data[parsedItemId];

        if (!item || !item.bids || item.bids.length === 0) {
            showHighestBox("No bids found for item ID " + parsedItemId + ".", "info");
            return;
        }

        let highest = item.bids[0];

        for (let i = 1; i < item.bids.length; i++) {
            if (item.bids[i].amount > highest.amount) {
                highest = item.bids[i];
            }
        }

        showHighestBox(
            "Highest Bidder: " + highest.bidder +
            " | Amount: " + highest.amount +
            " | Item ID: " + parsedItemId,
            "info"
        );
    }

    function showAllBids() {
        const itemId = document.getElementById("itemId").value.trim();
        const container = document.getElementById("bidsContainer");
        const data = getAuctionData();

        container.innerHTML = "";

        if (itemId === "") {
            const allItemIds = Object.keys(data);

            if (allItemIds.length === 0) {
                container.innerHTML = '<div class="empty">No auction data available.</div>';
                return;
            }

            allItemIds.forEach(id => {
                renderItemBids(container, id, data[id]);
            });

            return;
        }

        const parsedItemId = Number(itemId);

        if (isNaN(parsedItemId) || parsedItemId <= 0) {
            container.innerHTML = '<div class="empty">Enter a valid Item ID.</div>';
            return;
        }

        const item = data[parsedItemId];

        if (!item) {
            container.innerHTML = '<div class="empty">No bids available for item ID ' + parsedItemId + '.</div>';
            return;
        }

        renderItemBids(container, parsedItemId, item);
    }

    function renderItemBids(container, itemId, item) {
        const title = document.createElement("h3");
        title.textContent = "Item ID: " + itemId + " | Starting Price: " + item.startingPrice;
        title.style.color = "#0f172a";
        title.style.marginTop = "0";
        title.style.marginBottom = "10px";
        container.appendChild(title);

        if (!item.bids || item.bids.length === 0) {
            const empty = document.createElement("div");
            empty.className = "empty";
            empty.textContent = "No bids for this item.";
            container.appendChild(empty);
            return;
        }

        const table = document.createElement("table");
        table.innerHTML = `
            <thead>
                <tr>
                    <th>Bidder</th>
                    <th>Amount</th>
                    <th>Time</th>
                </tr>
            </thead>
            <tbody></tbody>
        `;

        const tbody = table.querySelector("tbody");

        const sortedBids = [...item.bids].sort((a, b) => b.amount - a.amount);

        sortedBids.forEach(bid => {
            const row = document.createElement("tr");
            row.innerHTML = `
                <td>${escapeHtml(bid.bidder)}</td>
                <td>${bid.amount}</td>
                <td>${escapeHtml(bid.time)}</td>
            `;
            tbody.appendChild(row);
        });

        container.appendChild(table);
    }

    function clearAllData() {
        localStorage.removeItem(STORAGE_KEY);
        document.getElementById("bidsContainer").innerHTML = '<div class="empty">All auction data cleared.</div>';
        document.getElementById("highestBidBox").style.display = "none";
        showMessage("All auction data has been cleared.", "success");
    }

    function escapeHtml(text) {
        const div = document.createElement("div");
        div.textContent = text;
        return div.innerHTML;
    }
</script>
</body>
</html>
